<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vice Governor's Cup</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f8;
      color: #222;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 28px;
      color: #111827;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    select,
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
    }

    .summary {
      margin-bottom: 12px;
      font-size: 14px;
      color: #4b5563;
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #111827;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover {
      background: #f9fafb;
    }

    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .completed {
      background: #dcfce7;
      color: #166534;
    }

    .pending {
      background: #fef3c7;
      color: #92400e;
    }

    .empty,
    .loading,
    .error {
      text-align: center;
      padding: 30px;
      background: white;
      border-radius: 12px;
      color: #6b7280;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .error {
      color: #991b1b;
      background: #fee2e2;
    }

    .mobile-cards {
      display: none;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .matchup {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      margin: 10px 0;
    }

    .team {
      background: #f9fafb;
      padding: 10px;
      border-radius: 10px;
    }

    .score {
      font-size: 22px;
      font-weight: bold;
      color: #111827;
      text-align: center;
    }

    .vs {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      h1 {
        font-size: 22px;
      }

      .filters {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .table-wrapper {
        display: none;
      }

      .mobile-cards {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vice Governor's Pickleball Cup</h1>

    <div class="filters">
      <select id="categoryFilter">
        <option value="">All Categories</option>
      </select>

      <select id="statusFilter">
        <option value="">All Status</option>
      </select>

      <input
        type="search"
        id="searchInput"
        placeholder="Search player name..."
        autocomplete="off"
      />
    </div>

    <div id="summary" class="summary"></div>
    <div id="content" class="loading">Loading data...</div>
  </div>

  <script>
    // Replace this with your published Google Sheets CSV link.
    // Example format:
    // https://docs.google.com/spreadsheets/d/e/YOUR_PUBLISHED_ID/pub?output=csv
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQESVtUGBn3UOwgtO4HRw3TA-edqlbDe46Pz127LTZcFvIqVfK3vFTMnpNfzNraknt6YP_zjInBPVOv/pub?gid=765552882&single=true&output=csv";

    let allRows = [];
    let filteredRows = [];

    const categoryFilter = document.getElementById("categoryFilter");
    const statusFilter = document.getElementById("statusFilter");
    const searchInput = document.getElementById("searchInput");
    const content = document.getElementById("content");
    const summary = document.getElementById("summary");

    function parseCSV(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          currentValue += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          currentRow.push(currentValue.trim());
          currentValue = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (currentValue || currentRow.length) {
            currentRow.push(currentValue.trim());
            rows.push(currentRow);
            currentRow = [];
            currentValue = "";
          }
          if (char === "\r" && nextChar === "\n") i++;
        } else {
          currentValue += char;
        }
      }

      if (currentValue || currentRow.length) {
        currentRow.push(currentValue.trim());
        rows.push(currentRow);
      }

      return rows;
    }

    function normalizeHeader(header) {
      return header.trim().toUpperCase().replace(/\s+/g, "");
    }

    function rowsToObjects(csvRows) {
      const headers = csvRows[0].map(normalizeHeader);
      return csvRows.slice(1).map(row => {
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = row[index] || "";
        });
        return obj;
      }).filter(row => Object.values(row).some(value => value !== ""));
    }

    function getPlayerText(row) {
      return [
        row.TEAM1PLAYER1,
        row.TEAM1PLAYER2,
        row.TEAM2PLAYER,
        row.TEAM2PLAYER2
      ].join(" ").toLowerCase();
    }

    function populateCategories() {
      const categories = [...new Set(allRows.map(row => row.CATEGORY).filter(Boolean))].sort();

      categories.forEach(category => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        categoryFilter.appendChild(option);
      });
    }

    function populateStatus() {
      const statuses = [...new Set(allRows.map(row => (row.STATUS || "Pending")).filter(Boolean))].sort();

      statuses.forEach(status => {
        const option = document.createElement("option");
        option.value = status;
        option.textContent = status;
        statusFilter.appendChild(option);
      });
    });
    }

    function applyFilters() {
      const selectedCategory = categoryFilter.value;
      const selectedStatus = statusFilter.value;
      const searchTerm = searchInput.value.trim().toLowerCase();

      filteredRows = allRows.filter(row => {
        const rowStatus = row.STATUS || "Pending";

        const matchesCategory = !selectedCategory || row.CATEGORY === selectedCategory;
        const matchesStatus = !selectedStatus || rowStatus === selectedStatus;
        const matchesSearch = !searchTerm || getPlayerText(row).includes(searchTerm);

        return matchesCategory && matchesStatus && matchesSearch;
      });

      render();
    });

      render();
    }

    function statusBadge(status) {
      const cleanStatus = status || "Pending";
      const className = cleanStatus.toLowerCase() === "completed" ? "completed" : "pending";
      return `<span class="badge ${className}">${escapeHTML(cleanStatus)}</span>`;
    }

    function escapeHTML(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function render() {
      summary.textContent = `Showing ${filteredRows.length} of ${allRows.length} games`;

      if (!filteredRows.length) {
        content.className = "empty";
        content.innerHTML = "No games found.";
        return;
      }

      content.className = "";
      content.innerHTML = `
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Category</th>
                <th>Game No.</th>
                <th>Team 1 Player 1</th>
                <th>Team 1 Player 2</th>
                <th>Team 1 Score</th>
                <th>Team 2 Score</th>
                <th>Team 2 Player 1</th>
                <th>Team 2 Player 2</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${filteredRows.map(row => `
                <tr>
                  <td>${escapeHTML(row.CATEGORY)}</td>
                  <td>${escapeHTML(row.GAMENO)}</td>
                  <td>${escapeHTML(row.TEAM1PLAYER1)}</td>
                  <td>${escapeHTML(row.TEAM1PLAYER2)}</td>
                  <td>${escapeHTML(row.TEAM1SCORE)}</td>
                  <td>${escapeHTML(row.TEAM2SCORE)}</td>
                  <td>${escapeHTML(row.TEAM2PLAYER)}</td>
                  <td>${escapeHTML(row.TEAM2PLAYER2)}</td>
                  <td>${statusBadge(row.STATUS)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>

        <div class="mobile-cards">
          ${filteredRows.map(row => `
            <div class="card">
              <div class="card-header">
                <span>${escapeHTML(row.CATEGORY)}</span>
                <span>Game ${escapeHTML(row.GAMENO)}</span>
              </div>

              <div class="matchup">
                <div class="team">
                  <strong>Team 1</strong><br />
                  ${escapeHTML(row.TEAM1PLAYER1)}<br />
                  ${escapeHTML(row.TEAM1PLAYER2)}
                  <div class="score">${escapeHTML(row.TEAM1SCORE)}</div>
                </div>

                <div class="vs">VS</div>

                <div class="team">
                  <strong>Team 2</strong><br />
                  ${escapeHTML(row.TEAM2PLAYER)}<br />
                  ${escapeHTML(row.TEAM2PLAYER2)}
                  <div class="score">${escapeHTML(row.TEAM2SCORE)}</div>
                </div>
              </div>

              ${statusBadge(row.STATUS)}
            </div>
          `).join("")}
        </div>
      `;
    }

    async function loadCSV() {
      try {
        if (!CSV_URL || CSV_URL === "PASTE_YOUR_PUBLISHED_CSV_LINK_HERE") {
          throw new Error("Please replace CSV_URL with your published Google Sheets CSV link.");
        }

        const response = await fetch(CSV_URL);

        if (!response.ok) {
          throw new Error("Unable to fetch CSV. Make sure the Google Sheet is published to the web as CSV.");
        }

        const csvText = await response.text();
        const csvRows = parseCSV(csvText);

        if (!csvRows.length) {
          throw new Error("CSV is empty.");
        }

        allRows = rowsToObjects(csvRows);
        filteredRows = [...allRows];

        populateCategories();
        populateStatus();
        render();
      } catch (error) {
        content.className = "error";
        content.innerHTML = escapeHTML(error.message);
      }
    }

    categoryFilter.addEventListener("change", applyFilters);
    statusFilter.addEventListener("change", applyFilters);
    searchInput.addEventListener("input", applyFilters);

    loadCSV();
  </script>
</body>
</html>
